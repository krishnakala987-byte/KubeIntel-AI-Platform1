apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubeintel-ingress
  namespace: kubeintel
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  rules:
  - host: kubeintel.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kubeops-ui-service
            port:
              number: 8501
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: kubeops-api-service
            port:
              number: 5000